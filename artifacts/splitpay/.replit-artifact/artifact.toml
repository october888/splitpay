kind = "web"
previewPath = "/"
title = "SplitPay"
version = "1.0.0"
id = "artifacts/splitpay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24211

[services.development]
run = "pnpm --filter @workspace/splitpay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/splitpay", "run", "build" ]
publicDir = "artifacts/splitpay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24211"
BASE_PATH = "/"
